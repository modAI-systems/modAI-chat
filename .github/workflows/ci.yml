name: CI

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "**"

jobs:
  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        working-directory: backend/omni
        run: just install

      - name: Check
        working-directory: backend/omni
        run: just check

  frontend-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        working-dir:
          - frontend/omni
          - e2e_tests/tests_omni_full
          - e2e_tests/tests_omni_light
          - docs
    steps:
      - uses: actions/checkout@v6

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: ${{ matrix.working-dir }}
        run: just install

      - name: Check
        working-directory: ${{ matrix.working-dir }}
        run: just check

  backend-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        working-directory: backend/omni
        run: just install

      - name: Run tests
        working-directory: backend/omni
        run: just test

  frontend-unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: frontend/omni
        run: just install

      - name: Run unit tests
        working-directory: frontend/omni
        run: just test

  e2e-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        name:
          - tests_omni_light
          - tests_omni_full
    steps:
      - uses: actions/checkout@v6

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.13

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies for frontend
        working-directory: frontend/omni
        run: just install

      - name: Install dependencies for backend (full tests only)
        if: matrix.name == 'tests_omni_full'
        working-directory: backend/omni
        run: just install

      - name: Install dependencies for tests
        working-directory: e2e_tests/${{ matrix.name }}
        run: just install

      - name: Run Playwright tests
        working-directory: e2e_tests/${{ matrix.name }}
        run: just test

      - name: Upload Test Results (traces, screenshots, videos)
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-${{ matrix.name }}
          path: e2e_tests/${{ matrix.name }}/playwright-report
          retention-days: 30
