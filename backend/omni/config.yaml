modules:
  health:
    class: modai.modules.health.simple_health_module.SimpleHealthModule
  chat_router:
    class: modai.modules.chat.web_chat_router.ChatWebModule
    config:
      clients:
        openai: chat_openai
    module_dependencies:
      chat_openai: chat_openai
      session: "session"
  chat_openai:
    class: modai.modules.chat.openai_agent_chat.StrandsAgentChatModule
    module_dependencies:
      llm_provider_module: openai_model_provider
      tool_registry: tool_registry
  model_provider_store:
    class: modai.modules.model_provider_store.sql_model_provider_store.SQLAlchemyModelProviderStore
    config:
      database_url: "sqlite:///./llm.db"
      echo: false
  openai_model_provider:
    class: modai.modules.model_provider.openai_provider.OpenAIProviderModule
    module_dependencies:
      llm_provider_store: "model_provider_store"
      session: "session"
  central_model_provider_router:
    class: modai.modules.model_provider.central_router.CentralModelProviderRouter
    module_dependencies:
      openai_provider: "openai_model_provider"
      session: "session"
  user_store:
    class: modai.modules.user_store.sqlalchemy_user_store.SQLAlchemyUserStore
    config:
      database_url: "sqlite:///./user_store.db"
      echo: false
  user_settings_store:
    class: modai.modules.user_settings_store.sqlalchemy_user_settings_store.SQLAlchemyUserSettingsStore
    config:
      database_url: "sqlite:///./user_settings.db"
      echo: false
  session:
    class: modai.modules.authentication.oidc_session.OIDCSessionModule
    config:
      session_secret: ${SESSION_SECRET}
      # Optional: session_duration: 86400  # seconds, default 24 h
    module_dependencies:
      user_store: "user_store"
  auth_oidc:
    class: modai.modules.authentication.oidc_auth_module.OIDCAuthModule
    config:
      issuer: ${OIDC_ISSUER}
      client_id: ${OIDC_CLIENT_ID}
      client_secret: ${OIDC_CLIENT_SECRET}
      redirect_uri: ${OIDC_REDIRECT_URI}
      post_login_uri: ${OIDC_POST_LOGIN_URI}
      post_logout_uri: ${OIDC_POST_LOGOUT_URI}
      session_secret: ${SESSION_SECRET}
      scopes: "openid profile email"
      # Optional:
      # session_duration: 86400   # seconds, default 24 h (should match session module)
      # cookie_secure: false      # set true in production (HTTPS)
      # cookie_samesite: "lax"
  user:
    class: modai.modules.user.simple_user_module.SimpleUserModule
    module_dependencies:
      session: "session"
      user_store: "user_store"
  user_settings:
    class: modai.modules.user_settings.simple_user_settings_module.SimpleUserSettingsModule
    module_dependencies:
      session: "session"
      user_settings_store: "user_settings_store"

  http_client:
    class: modai.modules.http_client.httpx_http_client_module.HttpxHttpClientModule

  openapi_tool_registry:
    class: modai.modules.tools.tool_registry_openapi.OpenAPIToolRegistryModule
    module_dependencies:
      http_client: "http_client"
    config:
      tools:
        - url: http://localhost:8001/roll
          method: POST
      # Example:
      # tools:
      #   - url: http://calculator-service:8000/calculate
      #     method: POST
      #   - url: http://web-search-service:8000/search
      #     method: PUT

  tool_registry:
    class: modai.modules.tools.tool_registry_predefined_vars.PredefinedVariablesToolRegistryModule
    module_dependencies:
      delegate_registry: "openapi_tool_registry"
    config:
      # Map tool parameter names that differ from the predefined variable name.
      # Format: <tool_param_name>: <predefined_var_name_without_leading_underscore>
      # Example: the predefined _session_id fills the tool's X-Session-Id header param.
      # variable_mappings:
      #   X-Session-Id: session_id

  tools_web:
    class: modai.modules.tools.tools_web_module.OpenAIToolsWebModule
    module_dependencies:
      tool_registry: tool_registry
