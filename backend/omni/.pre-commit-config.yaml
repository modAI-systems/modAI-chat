orphan: true

repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format check
        language: system
        entry: uv run ruff format --check src
        always_run: true
        pass_filenames: false

      - id: ruff-check
        name: ruff check
        language: system
        entry: uv run ruff check src
        always_run: true
        pass_filenames: false
