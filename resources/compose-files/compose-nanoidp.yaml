# NanoIDP – lightweight OIDC identity provider for local development.
#
# Runs on port 9000 to avoid colliding with the backend (port 8000).
# The sed commands patch NanoIDP's bundled settings.yaml which defaults to port 8000.
#
# Default credentials:
#   Client ID:     test-client
#   Client secret: test-secret
#   User / pass:   admin / admin   (email: admin@example.org)
#
# Health check: http://localhost:9000/api/health
#
# The port hack can be removed when https://github.com/cdelmonte-zg/nanoidp/issues/28 is resolved.
---
services:
  nanoidp:
    image: ghcr.io/cdelmonte-zg/nanoidp:latest
    command: >
      sh -c "sed -i 's/port: 8000/port: 9000/g' /app/config/settings.yaml &&
             sed -i 's|http://localhost:8000|http://localhost:9000|g' /app/config/settings.yaml &&
             nanoidp --host 0.0.0.0 --port 9000"
    ports:
      - "9000:9000"
